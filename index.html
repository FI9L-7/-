<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مصحف النور - نسخة فيصل</title>
<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>

<style>
    :root { --bg: #000; --accent: #00d9ff; --text: #fff; --gray: #1a1a1a; }
    body { background: var(--bg); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: auto; text-align: center; }
    header { border-bottom: 2px solid var(--gray); padding-bottom: 20px; margin-bottom: 30px; }
    .nav-btn { padding: 12px 25px; background: none; border: 1px solid #444; color: #fff; cursor: pointer; border-radius: 8px; margin: 5px; }
    .nav-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
    .search-input { width: 100%; padding: 15px; background: #0a0a0a; border: 2px solid var(--gray); color: #fff; border-radius: 10px; font-size: 1.2rem; outline: none; }
    .result-card { background: #050505; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--gray); cursor: pointer; text-align: right; }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>القرآن الكريم</h1>
        <div id="authSection">
            <button id="loginBtn" class="nav-btn" style="border-color: #4285F4;">تسجيل دخول بقوقل</button>
        </div>
        <div style="margin-top: 20px;">
            <button id="mBtn" class="nav-btn active" onclick="showTab('mushaf')">المصحف</button>
            <button id="sBtn" class="nav-btn" onclick="showTab('search')">البحث الذكي</button>
        </div>
    </header>

    <div id="mushafSection">
        <div id="surahGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px;"></div>
    </div>

    <div id="searchSection" style="display:none;">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن آية..." oninput="runSmartSearch()">
        <div id="searchResults"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAhsM5x8dmgabRDdbY1RRRe3PFlubIKKog",
        authDomain: "logen-93cfd.firebaseapp.com",
        projectId: "logen-93cfd",
        storageBucket: "logen-93cfd.firebasestorage.app",
        messagingSenderId: "1034179807516",
        appId: "1:1034179807516:web:6190f8987ec856b50935cc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ربط زر تسجيل الدخول
    document.getElementById('loginBtn').onclick = () => {
        signInWithPopup(auth, provider).catch(err => alert("خطأ في تسجيل الدخول: " + err.message));
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authSection').innerHTML = `<span>مرحباً، ${user.displayName}</span>`;
        }
    });

    // --- كود تشغيل المصحف والبحث ---
    let fuse;
    window.onload = () => {
        if (typeof quranData === 'undefined') return;
        
        const allAyahs = [];
        quranData.data.surahs.forEach(s => {
            const d = document.createElement('div');
            d.className = 'result-card';
            d.style.textAlign = 'center';
            d.innerHTML = s.name;
            document.getElementById('surahGrid').appendChild(d);

            s.ayahs.forEach(a => {
                allAyahs.push({ text: a.text, sName: s.name, aNum: a.numberInSurah });
            });
        });

        fuse = new Fuse(allAyahs, { keys: ['text'], threshold: 0.3 });
    };

    window.runSmartSearch = () => {
        const q = document.getElementById('searchInput').value;
        const resDiv = document.getElementById('searchResults');
        resDiv.innerHTML = "";
        if (q.length < 2) return;

        const results = fuse.search(q);
        results.slice(0, 10).forEach(r => {
            const item = r.item;
            resDiv.innerHTML += `<div class="result-card"><small>${item.sName} (${item.aNum})</small><br>${item.text}</div>`;
        });
    };

    window.showTab = (t) => {
        document.getElementById('mushafSection').style.display = t === 'mushaf' ? 'block' : 'none';
        document.getElementById('searchSection').style.display = t === 'search' ? 'block' : 'none';
        document.getElementById('mBtn').className = t === 'mushaf' ? 'nav-btn active' : 'nav-btn';
        document.getElementById('sBtn').className = t === 'search' ? 'nav-btn active' : 'nav-btn';
    };
</script>
</body>
</html>

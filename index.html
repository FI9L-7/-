<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مصحف النور</title>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithPopup,GoogleAuthProvider,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB_CFG={
  apiKey: "AIzaSyAhsM5x8dmgabRDdbY1RRRe3PFlubIKKog",
  authDomain: "logen-93cfd.firebaseapp.com",
  projectId: "logen-93cfd",
  storageBucket: "logen-93cfd.firebasestorage.app",
  messagingSenderId: "1034179807516",
  appId: "1:1034179807516:web:4c74c5bf6e08a9347c12d9",
};

let app, auth, db, fbReady = false;

window.addEventListener('load', () => {
    try {
        app = initializeApp(FB_CFG);
        auth = getAuth(app);
        db = getFirestore(app);
        fbReady = true;
        onAuthStateChanged(auth, user => {
            const btn = document.getElementById('authBtn');
            const nm = document.getElementById('authName');
            if (user) {
                nm.textContent = user.displayName;
                btn.textContent = 'خروج';
                btn.onclick = () => signOut(auth);
            } else {
                nm.textContent = 'غير مسجل';
                btn.textContent = 'دخول بقوقل';
                btn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
            }
        });
    } catch (e) { console.warn("Firebase Error"); }
});
</script>

<script defer src="data.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
/* 🎨 نفس تصميم كلاودي الفخم */
:root{ --bg:#04040a; --acc:#c9a84c; --txt:#ede5d5; --panel:#101020; --brd:#1e1e3a; }
body{ background:var(--bg); color:var(--txt); font-family:'Cairo',sans-serif; margin:0; padding-bottom:80px; direction:rtl; }
.wrap{ max-width:1000px; margin:auto; padding:15px; }
header{ text-align:center; padding:30px 10px; }
h1{ font-family:'Amiri', serif; font-size:2.5rem; color:var(--acc); }
.auth-bar{ display:flex; align-items:center; justify-content: space-between; background:var(--panel); padding:10px 15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--brd); }
.ntabs{ display:flex; justify-content:center; gap:10px; margin-bottom:20px; }
.nb{ padding:10px 20px; background:var(--panel); border:1px solid var(--brd); color:var(--txt); border-radius:10px; cursor:pointer; }
.nb.on{ background:var(--acc); color:#000; }
#sGrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; }
.sc{ background:var(--panel); padding:15px; border-radius:12px; text-align:center; border:1px solid var(--brd); cursor:pointer; }
.sc:hover{ border-color:var(--acc); }
.search-box{ width:100%; padding:15px; background:var(--panel); border:1px solid var(--brd); border-radius:12px; color:#fff; margin-bottom:20px; }
.result-card{ background:var(--panel); padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid var(--brd); }
</style>
</head>
<body>

<div class="wrap">
    <header>
        <h1>مصحف النور</h1>
        <p>نسخة فيصل الاحترافية</p>
    </header>

    <div class="auth-bar">
        <span id="authName">جاري التحميل...</span>
        <button id="authBtn" class="nb">دخول</button>
    </div>

    <div class="ntabs">
        <button id="mBtn" class="nb on" onclick="sTab('m')">📖 المصحف</button>
        <button id="sBtn" class="nb" onclick="sTab('s')">🔍 البحث</button>
    </div>

    <div id="tab-m">
        <div id="sGrid"></div>
    </div>

    <div id="tab-s" style="display:none">
        <input type="text" id="sinp" class="search-box" placeholder="ابحث عن آية..." oninput="onSr()">
        <div id="sRes"></div>
    </div>
</div>

<script>
// --- تشغيل الموقع والبحث ---
let fuse;
window.sTab = (t) => {
    document.getElementById('tab-m').style.display = t === 'm' ? 'block' : 'none';
    document.getElementById('tab-s').style.display = t === 's' ? 'block' : 'none';
    document.getElementById('mBtn').classList.toggle('on', t === 'm');
    document.getElementById('sBtn').classList.toggle('on', t === 's');
};

window.onload = () => {
    setTimeout(() => {
        if (typeof quranData === 'undefined') return;
        const grid = document.getElementById('sGrid');
        grid.innerHTML = "";
        const allAyahs = [];

        quranData.data.surahs.forEach(s => {
            const d = document.createElement('div');
            d.className = 'sc';
            d.innerHTML = `<strong>${s.name}</strong><br><small>${s.ayahs.length} آية</small>`;
            grid.appendChild(d);
            s.ayahs.forEach(a => allAyahs.push({ text: a.text, sName: s.name, aNum: a.numberInSurah }));
        });
        fuse = new Fuse(allAyahs, { keys: ['text'], threshold: 0.3 });
    }, 1000);
};

window.onSr = () => {
    const q = document.getElementById('sinp').value;
    const resDiv = document.getElementById('sRes');
    resDiv.innerHTML = "";
    if (q.length < 2 || !fuse) return;
    fuse.search(q).slice(0, 10).forEach(r => {
        resDiv.innerHTML += `<div class="result-card"><small>${r.item.sName} (${r.item.aNum})</small><br>${r.item.text}</div>`;
    });
};
</script>
</body>
</html>
